<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Photo Gallery</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, sans-serif;
  }

  /* همون استایل کارت ساعت */
  .photo-card {
    width: 220px;
    height: 220px;
    background: #ffffff;
    border-radius: 32px;
    box-shadow:
      0 10px 30px rgba(0, 0, 0, 0.08),
      0 2px 6px rgba(0, 0, 0, 0.04),
      inset 0 0 0 1px rgba(0, 0, 0, 0.03);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 12px;
    box-sizing: border-box;
  }

  .photo-frame {
    width: 100%;
    height: 100%;
    position: relative;
    border-radius: 22px;
    overflow: hidden;
    background: #f4f1ec;
  }

  .slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1.2s ease-in-out, transform 30s ease-out;
    transform: scale(1);
  }

  .slide.active {
    opacity: 1;
    transform: scale(1.08); /* افکت نرم Ken Burns - زوم آروم */
  }
</style>
</head>
<body>
  <div class="photo-card">
    <div class="photo-frame" id="frame"></div>
  </div>

<script>
  /* ====== فقط این لیست رو ویرایش کن ======
     آدرس عکس‌هات از گیت‌هاب رو اینجا بذار.
     اگه از GitHub Pages استفاده می‌کنی:
       https://USERNAME.github.io/REPO/images/photo1.jpg
     اگه از raw.githubusercontent.com استفاده می‌کنی:
       https://raw.githubusercontent.com/USERNAME/REPO/main/images/photo1.jpg
  */
  const images = [
    "images/photo1.jpg",
    "images/photo2.jpg",
    "images/photo3.jpg",
    "images/photo4.jpg",
    "images/photo5.jpg",
    "images/photo6.jpg"
  ];

  const intervalMs = 30000; // ۳۰ ثانیه
  /* ======================================= */

  const frame = document.getElementById('frame');
  const slides = [];

  // پری‌لود همه عکس‌ها به صورت دو لایه (برای کراس‌فید نرم)
  images.forEach((src) => {
    const div = document.createElement('div');
    div.className = 'slide';
    div.style.backgroundImage = `url("${src}")`;
    frame.appendChild(div);
    slides.push(div);

    // پری‌لود
    const img = new Image();
    img.src = src;
  });

  let current = 0;
  if (slides.length > 0) slides[0].classList.add('active');

  function nextSlide() {
    if (slides.length < 2) return;
    const prev = current;
    current = (current + 1) % slides.length;

    slides[current].classList.add('active');
    // یه تاخیر کوتاه تا فید روی هم بیفته بعد قبلی محو بشه
    setTimeout(() => {
      slides[prev].classList.remove('active');
    }, 1200);
  }

  setInterval(nextSlide, intervalMs);
</script>
</body>
</html>
