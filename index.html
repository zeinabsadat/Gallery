<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Photo Gallery</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .photo-card {
    width: 200px;
    height: 200px;
    background: #ffffff;
    border-radius: 28px;
    box-shadow:
      0 10px 30px rgba(0, 0, 0, 0.08),
      0 2px 6px rgba(0, 0, 0, 0.04),
      inset 0 0 0 1px rgba(0, 0, 0, 0.03);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 11px;
    box-sizing: border-box;
  }

  .photo-frame {
    width: 100%;
    height: 100%;
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    background: #f4f1ec;
  }

  .slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 1.2s ease-in-out, transform 30s ease-out;
    transform: scale(1);
  }

  .slide.active {
    opacity: 1;
    transform: scale(1.08);
  }

  .loading {
    width: 22px;
    height: 22px;
    border: 2px solid #eee;
    border-top-color: #c98a3a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="photo-card">
    <div class="photo-frame" id="frame">
      <div class="loading" id="loading"></div>
    </div>
  </div>

<script>
  const GITHUB_USER   = "zeinabsadat";
  const GITHUB_REPO   = "Gallery";
  const GITHUB_BRANCH = "main";
  const intervalMs    = 30000;

  const frame   = document.getElementById('frame');
  const loading = document.getElementById('loading');
  const imageRegex = /\.(jpg|jpeg|png|gif|webp|avif)$/i;

  async function loadImages() {
    try {
      const apiUrl = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/?ref=${GITHUB_BRANCH}`;
      const res = await fetch(apiUrl);
      const files = await res.json();

      const images = files
        .filter(f => f.type === 'file' && imageRegex.test(f.name))
        .map(f => f.download_url);

      if (images.length === 0) {
        loading.style.display = 'none';
        frame.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#999;font-size:12px;">No images found</div>';
        return;
      }

      images.sort(() => Math.random() - 0.5);
      startSlideshow(images);
    } catch (err) {
      console.error('Error loading images:', err);
      loading.style.display = 'none';
    }
  }

  function startSlideshow(images) {
    loading.style.display = 'none';
    const slides = [];

    images.forEach((src) => {
      const div = document.createElement('div');
      div.className = 'slide';
      div.style.backgroundImage = `url("${src}")`;
      frame.appendChild(div);
      slides.push(div);

      const img = new Image();
      img.src = src;
    });

    let current = 0;
    slides[0].classList.add('active');

    if (slides.length < 2) return;

    setInterval(() => {
      const prev = current;
      current = (current + 1) % slides.length;

      slides[current].classList.add('active');
      setTimeout(() => {
        slides[prev].classList.remove('active');
      }, 1200);
    }, intervalMs);
  }

  loadImages();
</script>
</body>
</html>
